# jobfinder configuration — copy to config.yaml and edit to match what you want.
# Sites: indeed, linkedin, google, zip_recruiter, glassdoor
# (Indeed is the most reliable; LinkedIn rate-limits aggressively, keep results_wanted modest.)
#
# LinkedIn geo-scopes searches to the posting's tagged location, and multi-location
# postings are often tagged at state level — consider adding state-scoped searches
# (e.g. location: "Washington State, United States") alongside city ones. Beware
# ambiguous names: LinkedIn resolves "Washington, United States" to Washington DC.
# fetch_descriptions costs one extra LinkedIn request per job (keep results_wanted
# modest) but lets salary ranges be parsed out of the description text.
#
# google + zip_recruiter broken upstream as of 2026-07 (Google: cursor not found;
# ZipRecruiter: Cloudflare 403). Re-add after a python-jobspy update fixes them.

searches:
  - name: platform-eng
    sites: [indeed, linkedin]
    search_term: "platform engineer"
    location: "San Francisco, CA"
    hours_old: 4          # slightly more than the timer interval; overlap is deduped
    results_wanted: 30
    country_indeed: USA
    fetch_descriptions: true
    # google_search_term: optional override; auto-built from search_term + location
  # Nationwide-remote jobs are tagged "United States", which geo-scoped searches
  # never return — add a remote search to catch them. is_remote uses the board's
  # structured remote facet (LinkedIn only; Indeed ignores it when hours_old is set).
  # LinkedIn's facet regularly leaks hybrid/on-site jobs, so matches from remote
  # searches tagged outside locations_allow are re-verified against LinkedIn's
  # workplace-type data before alerting (two extra requests per suspect job).
  - name: platform-eng-remote
    sites: [linkedin]
    search_term: "platform engineer"
    location: "United States"
    is_remote: true
    hours_old: 4
    results_wanted: 30
    fetch_descriptions: true

filters:
  # Regexes, any-match. Leave a list empty to skip that check.
  title_include: ["(?i)(platform|infrastructure|site reliability|sre)"]
  title_exclude: ["(?i)(intern|junior)"]
  # Whole-word, case-insensitive company names to skip.
  employer_exclude: ["Initech"]
  # Case-insensitive regexes matched against the posting location; "remote" also
  # accepts postings flagged remote. ',\s*(ca|wa)\b' catches "Oakland, CA" style.
  locations_allow: ["san francisco", "remote"]
  # On-site/hybrid jobs in these locations are rejected even when the allowlist
  # would accept them; fully remote jobs are exempt (remote postings are often
  # tagged with a hiring-hub city).
  locations_deny: ["sacramento"]
  salary:
    min: 150000           # yearly; hourly/monthly postings are normalized before comparing
    currency: USD
    keep_unlisted: true   # postings with no salary data still alert, flagged "salary unlisted"

# Daily digest email: compares the day's matches against your resume via the
# Claude API and groups them into strong/weak/no match. Needs ANTHROPIC_API_KEY
# in .env and the email channel configured. resume_path is resolved relative to
# this file's directory when not absolute.
digest:
  enabled: false
  time: "18:00"          # local time, HH:MM
  model: claude-opus-4-8
  resume_path: resume.md

# Per-job tailored resume generation ("Tailor" button in the jobs UI): rewrites
# digest.resume_path for a specific posting via the Claude API (strictly from
# the resume's real content) and renders it through an HTML template for
# print-to-PDF. template_path resolves relative to this file's directory; if
# the file is missing, a built-in default template is used.
tailor:
  template_path: resume-template.html
  model: claude-opus-4-8

notify:
  # Per-run match alerts. pushover needs PUSHOVER_* in .env; email needs SMTP_*.
  # Leave empty ([]) for digest-only — no per-run alerts.
  channels: [pushover, email]
  # Channels for site-health alerts. Omit to reuse `channels`; set explicitly to
  # decouple them — e.g. channels: [] with health_channels: [email] gets you the
  # daily digest plus health warnings but no per-run match spam.
  # health_channels: [email]
  digest_threshold: 5     # pushover only: more matches than this in one run -> single digest push
                          # (email always sends one message per run with all matches)
  health_alerts: true     # master switch for health alerts (via health_channels)
  empty_runs_before_alert: 3

# Boards (LinkedIn especially) repost the same role under a fresh job id, often
# tagged to a different metro. A job whose company+title already alerted within
# this many days of its last sighting is suppressed as a repost. 0 disables.
repost_window_days: 60

# Minutes between poll cycles (web app scheduler). Keep hours_old above
# slightly larger than this so consecutive runs overlap; overlap is deduped.
poll_interval_minutes: 120

# LinkedIn's remote facet leaks hybrid/on-site jobs, so facet-only remote
# matches are re-verified against LinkedIn's own workplace-type data. That
# check is sometimes inconclusive: fail_closed drops the job (no false-remote
# alerts, may rarely miss a real one), fail_open keeps it.
remote_verification_policy: fail_closed
